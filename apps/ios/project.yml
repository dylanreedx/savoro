name: Savoro
options:
  bundleIdPrefix: com.savoro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1"
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  Savoro:
    type: application
    platform: iOS
    sources:
      - path: Savoro/Sources
      - path: Savoro/Assets.xcassets
      - path: Savoro/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.savoro.app
      INFOPLIST_FILE: Savoro/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
