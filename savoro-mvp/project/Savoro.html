<!-- Savoro design system tokens + fonts + base -->
<link rel="stylesheet" href="_ds/savoro-design-system-198dc0f6-6b19-4a12-ba10-41b888e04432/styles.css" />

<style>
  html, body { height: 100%; margin: 0; background: #0a0a0a; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
  #root { height: 100%; }
  * { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
  image-slot { border-radius: 20px; }

  /* ── Dark appearance — warm medium-dark, not aggressive black ── */
  [data-theme="dark"] {
    --sand-100: oklch(1 0 0 / 0.07);
    --sand-200: oklch(1 0 0 / 0.10);
    --sand-300: oklch(1 0 0 / 0.22);

    --glass: oklch(1 0 0 / 0.08);
    --glass-strong: oklch(1 0 0 / 0.16);
    --glass-subtle: oklch(1 0 0 / 0.04);
    --glass-hover: oklch(1 0 0 / 0.20);
    --glass-border: oklch(1 0 0 / 0.14);

    --surface-page: oklch(0.255 0.014 60);
    --surface-raised: oklch(0.305 0.014 60);
    --surface-card: var(--glass);
    --surface-card-strong: var(--glass-strong);
    --surface-inverse: oklch(0.37 0.012 55);

    --text-strong: oklch(0.97 0.006 85);
    --text-body: oklch(0.86 0.010 80);
    --text-muted: oklch(0.70 0.012 75);
    --text-subtle: oklch(0.58 0.012 70);

    --border: oklch(1 0 0 / 0.12);
    --border-strong: oklch(1 0 0 / 0.20);
    --border-glass: var(--glass-border);

    --accent-soft: oklch(0.66 0.07 10 / 0.24);
    --accent-strong: oklch(0.85 0.06 12);
    --positive: oklch(0.79 0.06 150);
    --positive-soft: oklch(0.72 0.05 150 / 0.20);

    --macro-calories: oklch(0.86 0.05 28);
    --ring: var(--blush-400);
  }
</style>
