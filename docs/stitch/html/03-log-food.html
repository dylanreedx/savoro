<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log Sheet - Savoro Muse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#2f3aa3",
                        "on-error": "#ffffff",
                        "on-background": "#1a1c1c",
                        "surface-container-high": "#e8e8e7",
                        "primary-fixed-dim": "#ffb2b9",
                        "on-surface": "#1a1c1c",
                        "on-secondary-fixed": "#1f1b17",
                        "surface-bright": "#f9f9f8",
                        "tertiary-container": "#8a95ff",
                        "inverse-on-surface": "#f1f1f0",
                        "inverse-primary": "#ffb2b9",
                        "inverse-surface": "#2f3130",
                        "on-primary-container": "#6f0122",
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed-dim": "#cec5bf",
                        "on-tertiary": "#ffffff",
                        "outline": "#8a7173",
                        "surface": "#f9f9f8",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#6a635e",
                        "error-container": "#ffdad6",
                        "primary-container": "#fb7185",
                        "secondary-container": "#eae1da",
                        "surface-tint": "#a93349",
                        "surface-container": "#eeeeed",
                        "tertiary": "#4953bc",
                        "surface-dim": "#dadad9",
                        "on-tertiary-container": "#1a2591",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#400010",
                        "on-primary-fixed-variant": "#891933",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#bdc2ff",
                        "on-tertiary-fixed": "#000767",
                        "surface-container-low": "#f3f4f3",
                        "tertiary-fixed": "#e0e0ff",
                        "primary-fixed": "#ffdadc",
                        "secondary-fixed": "#eae1da",
                        "on-secondary-fixed-variant": "#4b4641",
                        "outline-variant": "#debfc1",
                        "error": "#ba1a1a",
                        "secondary": "#645d58",
                        "primary": "#FDA4AF", /* Updated to softer rose */
                        "surface-container-highest": "#e2e2e2",
                        "on-surface-variant": "#574143"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; /* Updated light weight */
        }
        .macro-gradient {
            background: linear-gradient(90deg, #F87171 0%, #818CF8 50%, #FBBF24 100%);
            filter: blur(16px);
            opacity: 0.12;
        }
        .glass-sheet {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .glass-button-primary {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 164, 175, 0.3);
            color: #1a1c1c;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen relative overflow-hidden">
<!-- Background Layer (Blurred Today Screen) -->
<main class="fixed inset-0 z-0 p-6 filter blur-md pointer-events-none scale-105">
<div class="flex justify-between items-end mb-12">
<div>
<p class="text-stone-400 label-md uppercase tracking-widest mb-1">Thursday, Oct 24</p>
<h1 class="text-on-surface headline-lg font-extrabold tracking-tighter">Today</h1>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>
</div>
<div class="grid grid-cols-1 gap-6">
<div class="h-48 rounded-[2rem] bg-surface-container-low shadow-sm"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 rounded-[2rem] bg-surface-container-low"></div>
<div class="h-32 rounded-[2rem] bg-surface-container-low"></div>
</div>
</div>
</main>
<!-- Overlay / Scrim -->
<div class="fixed inset-0 bg-on-surface/5 z-10"></div>
<!-- Half-Sheet Log Overlay -->
<section class="fixed bottom-0 left-0 right-0 z-20 h-[751px] glass-sheet rounded-t-[3rem] shadow-2xl flex flex-col">
<!-- Sheet Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 rounded-full bg-on-surface/10"></div>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto px-8 pb-10">
<!-- Header & Input Area -->
<div class="mt-8 mb-10">
<label class="block text-on-surface headline-lg font-extrabold tracking-tighter mb-6" for="food-input">
                    What did you eat?
                </label>
<div class="relative">
<textarea class="w-full bg-transparent border-none p-0 text-display-sm font-medium focus:ring-0 placeholder:text-stone-200 resize-none text-on-surface-variant leading-tight" id="food-input" placeholder="Type or speak..." rows="2">chicken shawarma bowl with extra rice</textarea>
</div>
</div>
<!-- AI Resolved Preview Card -->
<div class="glass-card rounded-[2.5rem] p-8 relative overflow-hidden mb-10">
<!-- Subtle Gradient Aura -->
<div class="absolute inset-0 macro-gradient -z-10"></div>
<div class="flex justify-between items-start mb-8">
<div>
<span class="inline-flex items-center gap-1.5 text-primary label-sm font-bold uppercase tracking-wider mb-2">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1, 'wght' 300;">auto_awesome</span>
                            AI Analysis
                        </span>
<h3 class="text-on-surface headline-md font-bold tracking-tight">Chicken Shawarma Bowl</h3>
<p class="text-stone-400 body-md font-medium">Estimated 640 kcal • High Protein</p>
</div>
<button class="bg-primary/20 border border-primary/30 text-primary w-12 h-12 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined font-bold" style="font-variation-settings: 'wght' 600;">check</span>
</button>
</div>
<!-- Macro Breakdown -->
<div class="grid grid-cols-3 gap-6">
<div class="flex flex-col gap-1">
<span class="label-sm text-stone-400 font-bold uppercase tracking-widest">Protein</span>
<div class="flex items-end gap-2">
<span class="text-2xl font-bold text-rose-400">42g</span>
<div class="h-1 w-full bg-rose-50 rounded-full mb-2 overflow-hidden">
<div class="h-full bg-rose-400 w-[70%]"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="label-sm text-stone-400 font-bold uppercase tracking-widest">Carbs</span>
<div class="flex items-end gap-2">
<span class="text-2xl font-bold text-indigo-300">58g</span>
<div class="h-1 w-full bg-indigo-50 rounded-full mb-2 overflow-hidden">
<div class="h-full bg-indigo-300 w-[55%]"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="label-sm text-stone-400 font-bold uppercase tracking-widest">Fat</span>
<div class="flex items-end gap-2">
<span class="text-2xl font-bold text-amber-500">18g</span>
<div class="h-1 w-full bg-amber-50 rounded-full mb-2 overflow-hidden">
<div class="h-full bg-amber-500 w-[30%]"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Quick Action Row -->
<div class="flex items-center gap-4 mb-10">
<button class="flex-1 h-16 rounded-2xl glass-card flex items-center justify-center gap-3 text-on-surface-variant hover:bg-white/60 transition-colors">
<span class="material-symbols-outlined text-rose-400" style="font-variation-settings: 'wght' 300;">photo_camera</span>
<span class="font-bold label-md uppercase tracking-wider text-stone-500">Camera</span>
</button>
<button class="flex-1 h-16 rounded-2xl glass-card flex items-center justify-center gap-3 text-on-surface-variant hover:bg-white/60 transition-colors">
<span class="material-symbols-outlined text-indigo-300" style="font-variation-settings: 'wght' 300;">barcode_scanner</span>
<span class="font-bold label-md uppercase tracking-wider text-stone-500">Barcode</span>
</button>
<button class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-on-surface-variant hover:bg-white/60 transition-colors">
<span class="material-symbols-outlined text-amber-500" style="font-variation-settings: 'wght' 300;">mic</span>
</button>
</div>
<!-- Favorite Food Chips -->
<div class="space-y-4">
<h4 class="text-stone-400 label-md font-bold uppercase tracking-widest px-1">Recent Favorites</h4>
<div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar -mx-1 px-1">
<button class="whitespace-nowrap px-6 py-3 rounded-full glass-card text-stone-500 font-medium body-md hover:border-primary/50 transition-colors">
                        Overnight Oats
                    </button>
<button class="whitespace-nowrap px-6 py-3 rounded-full glass-card text-stone-500 font-medium body-md hover:border-primary/50 transition-colors">
                        Protein Shake
                    </button>
<button class="whitespace-nowrap px-6 py-3 rounded-full glass-card font-medium body-md border-primary/50 text-primary bg-primary/5">
                        Chicken Bowl
                    </button>
<button class="whitespace-nowrap px-6 py-3 rounded-full glass-card text-stone-500 font-medium body-md hover:border-primary/50 transition-colors">
                        Greek Yogurt
                    </button>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-8 pt-4">
<button class="w-full h-16 glass-button-primary rounded-2xl font-bold text-lg shadow-sm flex items-center justify-center gap-2">
                Log Meal
                <span class="material-symbols-outlined font-bold" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
</section>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
